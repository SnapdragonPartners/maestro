# The paired-agent default configuration (ADR 0025: mandatory from the
# start): v1's factory path, driven black-box by the v1-as-patched adapter.
# Budget expectations are provisional until item 6's instrumented runs.
schema_version = 1
name = "paired-default"
description = "v1-as-patched paired-agent factory default"

[model]
default = "claude-sonnet-4-6"

[model.roles]
coder = "claude-sonnet-4-6"
architect = "claude-opus-4-1"
pm = "claude-sonnet-4-6"

[prompt]
pack = "v1-embedded"

[harness]
adapter = "v1-as-patched"

[harness.settings]
# Paths are relative to the runner's working directory (benchmark/).
maestro_bin = "../bin/maestro"
source_dir = ".."
platform = "go"
test_cmd = "go test ./..."
poll_interval = "5s"
# Library fixtures carry no Dockerfile; pin a Go-capable coder container
# (discovery run 3: the bootstrap fallback has no Go toolchain).
container_image = "golang:1.26"

# Expectations remain provisional until item 6; caps sized from the
# discovery runs (v1's paired factory costs real money — measuring that
# is the point).
[budget]
expected_tokens_per_run = 1500000
expected_cost_usd_per_run = 10.0
max_cost_usd_per_run = 24.0
max_cost_usd_per_suite = 96.0
