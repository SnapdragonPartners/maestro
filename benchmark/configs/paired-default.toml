# The paired-agent default configuration (ADR 0025: mandatory from the
# start): v1's factory path, driven black-box by the v1-as-patched adapter.
# Budget expectations are provisional until item 6's instrumented runs.
schema_version = 2
name = "paired-default"
description = "v1-as-patched paired-agent factory default"

[model]
default = "claude-sonnet-4-6"

[model.roles]
coder = "claude-sonnet-4-6"
architect = "claude-opus-4-1"
pm = "claude-sonnet-4-6"

[prompt]
pack = "v1-embedded"

[harness]
adapter = "v1-as-patched"

[harness.settings]
# Paths are relative to the runner's working directory (benchmark/).
maestro_bin = "../bin/maestro"
source_dir = ".."
platform = "go"
test_cmd = "go test ./..."
poll_interval = "5s"
# Library fixtures carry no Dockerfile; pin a Go-capable coder container
# (discovery run 3: the bootstrap fallback has no Go toolchain). The union
# cache image (item 5.1, #268) is golang:1.26 with every golden Go fixture's
# module cache baked in, so runs skip the cold `go mod download` tax. It is a
# multi-arch manifest (linux/amd64 + linux/arm64) so arm64 dev and amd64 CI
# both pull their matching arch; pinned by the arch-independent immutable
# manifest digest so identical harness hashes execute identical contents.
# Republish + re-pin when a fixture re-pins (benchmark/cache/, make cache-publish).
container_image = "ghcr.io/snapdragonpartners/golden-cache@sha256:dfc3f0d040229b75e5ad5982c26e5e988a9d5d9ca6441d61d3741defc0516b91"

# Expectations remain provisional until item 6; caps sized from the
# discovery runs (v1's paired factory costs real money — measuring that
# is the point).
[budget]
expected_tokens_per_run = 1500000
expected_cost_usd_per_run = 10.0
max_cost_usd_per_run = 24.0
max_cost_usd_per_suite = 96.0
