# Golden story: BREADTH at roughly rung-3 difficulty (not a new rung).
#
# What this tests that nothing else does: a COORDINATED CHANGE ACROSS SOURCE
# FILES. Every other story is confined to one or two files, and dep-bump's two
# are generated (go.mod/go.sum), so the suite has never exercised a plan that
# must sequence edits across files or a diff-confinement check with real
# breadth. The seam is deliberate: threading a value from a flag in main.go to
# its use in server.go forces newServer's signature to change, so the two files
# cannot be edited independently and a half-done change does not compile.
#
# Deliberately stdlib-only (flag, time, context). The cleanup story already
# showed the coder wandering when it needs an external dependency's API
# (patches_v1.md, dependency-API exploration), so keeping this self-contained
# isolates multi-file coordination from that known and separate defect —
# a red here means something we do not already know.
#
# Behaviour preservation is checkable rather than asserted: the 60s default
# must survive the move, so the literal is expected to DISAPPEAR from
# server.go and APPEAR in main.go. A story that merely deleted the timeout
# would fail that pair of checks.
schema_version = 1
id = "flag-chat-timeout"
title = "Make the per-request chat timeout configurable from a flag"
level = "story"

[fixture]
repo = "https://github.com/SnapdragonPartners/golden-fixture-chat"
commit = "6ed67444e955afb07dda2f6ddec572f96b194c43"
base_branch = "main"

[prompt]
text = """
The per-request chat timeout is hardcoded where the request context is
built in server.go, so operators cannot change it without a rebuild.

Make it configurable from a command-line flag named `chat-timeout`,
following the pattern main.go already uses for its listen address. The
flag's value must reach the place the request context is built, so the
timeout that applies to a chat request is the configured one.

Keep the current behaviour as the default: an operator who passes no flag
must get the same timeout as today.
"""

[expectations]
allowed_paths = ["main.go", "server.go"]
required_artifacts = ["pr"]
evidence_shape = ["diff", "test-output"]

[[validators]]
name = "build"
command = "go build ./..."

[[validators]]
name = "vet"
command = "go vet ./..."

[[checks]]
name = "diff-confined-to-source"
type = "files_changed_within"

[[checks]]
# The flag exists and is named as specified.
name = "chat-timeout-flag-declared"
type = "command"
command = "sh -c 'grep -q \"chat-timeout\" main.go'"

[[checks]]
# The hardcoded literal is gone from where the request context is built.
name = "hardcoded-timeout-removed"
type = "command"
command = "sh -c 'test \"$(grep -c \"60\\*time.Second\" server.go)\" -eq 0'"

[[checks]]
# ...and the 60s default survived the move rather than being dropped.
# Together with the check above this is the behaviour-preservation pair.
name = "default-preserved-in-main"
type = "command"
command = "sh -c 'grep -qE \"60[ ]*\\*[ ]*time.Second|60s\" main.go'"

[[checks]]
# The value is genuinely threaded rather than re-hardcoded: newServer must
# accept it, which is what forces both files to change together.
name = "timeout-threaded-through-newserver"
type = "command"
command = "sh -c 'grep -qE \"func newServer\\(.*time.Duration\" server.go'"

[[checks]]
# The request context is still built with a timeout — the feature was made
# configurable, not deleted.
name = "request-context-still-bounded"
type = "command"
command = "sh -c 'grep -q \"context.WithTimeout(r.Context()\" server.go'"

[[checks]]
# Scoped to main.go, matching the precedent set by cleanup-provider-options:
# the fixture's server.go ships from upstream with gofmt drift (struct-tag
# alignment in chatRequest), so asserting gofmt over it is UNSATISFIABLE and
# would fail the story for someone else's formatting. Caught by the
# achievability check before this story ever cost a paired-default run.
name = "gofmt-clean-main"
type = "command"
command = "sh -c 'test -z \"$(gofmt -l main.go)\"'"

[budget]
# Provisional: no accepted run exists for this story. Sized from bugfix
# (727k/$7.06), the nearest completed story, with headroom for the extra file.
# Recalibrate on first acceptance per the D9 rule.
max_tokens = 2500000
max_wall_clock_seconds = 2700
max_cost_usd = 24.0
