# Golden story: ladder rung 2 (small code cleanup).
#
# REPAIRED 2026-07-22 after the original was parked for over-decomposition:
# the architect split it into 5 Stories, one per provider, and 0 of 5 ever
# completed across two attempts (2.01M tok/$9.37, then 2.26M/$13.11).
# Hypothesis under test: the ENUMERATION invited the split. The original
# prompt listed all five function names and then three more per-provider
# special cases, which reads as five work items rather than one refactor.
# Two things changed, and only two — the fixture pin, checks, validators and
# allowed paths are untouched, so a pass/fail is attributable to the prompt:
#   1. The five function names and the three per-provider selection rules are
#      no longer enumerated. They are discoverable in the code; naming them
#      in the prompt bought nothing and cost cohesion.
#   2. The task's cohesion is stated outright — one shared helper, so a
#      per-provider split means rewriting the same helper five times. That is
#      a true property of the work, the kind a tech lead would say aloud, not
#      a hint about the harness.
# If it now completes, the defect was ours (authoring). If it still splits,
# the defect is structural — nothing reviews an architect's decomposition
# (ADR backlog #15) — and no prompt wording will fix it.
#
# Consolidation is verified structurally: the fixture base has 5 call
# sites each of .ListModels(, "construct failed", and "ListModels failed"
# (one per provider); a real consolidation collapses each to a shared
# helper. The <= 2 thresholds tolerate one idiosyncratic path without
# admitting the unconsolidated original. Hermetic regression tests are
# deliberately not seeded: the refactor's entire surface is internal, so
# tests would pin the very names the refactor is free to change.
schema_version = 1
id = "cleanup-provider-options"
title = "Consolidate the duplicated per-provider option functions"
level = "story"

[fixture]
repo = "https://github.com/SnapdragonPartners/golden-fixture-chat"
commit = "6ed67444e955afb07dda2f6ddec572f96b194c43"
base_branch = "main"

[prompt]
text = """
providers.go builds a ModelOption for each supported provider, and the
per-provider functions are near-identical: every one looks up environment
credentials, constructs a client, lists models under the shared timeout,
selects a model, and returns a ModelOption.

Consolidate that duplicated flow behind a single shared helper, leaving
each provider to contribute only what genuinely differs — its credential
lookup, its client constructor, and its model-selection rule.

This is one refactor, not a series of per-provider changes: the helper is
shared, so doing it provider by provider means rewriting the same helper
each time. Observable behavior must not change, including the provider
prefixes in log messages and the order providers appear in the model
dropdown.
"""

[expectations]
allowed_paths = ["providers.go"]
required_artifacts = ["pr"]
evidence_shape = ["diff"]

[[validators]]
name = "build"
command = "go build ./..."

[[validators]]
name = "vet"
command = "go vet ./..."

[[checks]]
name = "diff-confined-to-providers"
type = "files_changed_within"

[[checks]]
name = "listmodels-call-sites-consolidated"
type = "command"
command = "sh -c 'test \"$(grep -c \"\\.ListModels(\" providers.go)\" -le 2'"

[[checks]]
name = "construct-log-consolidated"
type = "command"
command = "sh -c 'test \"$(grep -c \"construct failed\" providers.go)\" -le 2'"

[[checks]]
name = "listmodels-log-consolidated"
type = "command"
command = "sh -c 'test \"$(grep -c \"ListModels failed\" providers.go)\" -le 2'"

[[checks]]
# Scoped to the story's one allowed file: the fixture's server.go ships
# from upstream with minor gofmt drift (realistic friction, out of scope).
name = "gofmt-clean-providers"
type = "command"
command = "sh -c 'test -z \"$(gofmt -l providers.go)\"'"

[budget]
# Provisional: no accepted run exists for this story, so the D9 rule
# (>=3x observed accepted max) has nothing to key on. Sized from bugfix —
# the nearest completed story — and capped at the config's per-run ceiling.
# Recalibrate on first acceptance.
max_tokens = 3000000
max_wall_clock_seconds = 2700
max_cost_usd = 24.0
